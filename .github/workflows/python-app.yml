name: Python application

on: [workflow_dispatch, push, pull_request]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        run: pip install uv
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Lint with ruff
        run: uv run ruff check .
      - name: Type check with basedpyright
        run: uv run basedpyright .
      - name: Lint with pylint
        run: uv run pylint lobe_server TRIKLobeServer.py tests
      - name: Test with pytest
        run: uv run pytest --cov=lobe_server --cov-fail-under=90

  build:
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12"]
    runs-on: ${{ matrix.os }}
    env:
      SCRIPT_NAME: TRIKLobeServer

    steps:
      - uses: actions/checkout@v6
      - uses: benjlevesque/short-sha@v4.0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        run: pip install uv
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Build single app for ${{ env.SCRIPT_NAME }}
        run: uv run pyinstaller ${{ env.SCRIPT_NAME }}.py --icon=trik-studio.ico --onefile
      - name: Archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.SCRIPT_NAME }}-${{ runner.os }}-${{ env.SHA }}
          path: |
            dist
            settings.ini
