name: Python application

on: [workflow_dispatch, push, pull_request]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Lint with ruff
        run: uv run ruff check .
      - name: Check markdown formatting
        run: uv run mdformat README.md MODERNIZATION.md AGENTS.md --check
      - name: Type check with basedpyright
        run: uv run basedpyright .
      - name: Lint with pylint
        run: uv run pylint lobe_server TRIKLobeServer.py tests
      - name: Security scan with bandit
        run: uv run bandit -r lobe_server/ TRIKLobeServer.py --skip B107
      - name: Dead code check with vulture
        run: uv run vulture lobe_server/ tests/ TRIKLobeServer.py
      - name: Test with pytest
        run: uv run pytest --cov=lobe_server --cov-fail-under=90

  build:
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-2022, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      SCRIPT_NAME: TRIKLobeServer

    steps:
      - uses: actions/checkout@v7
      - uses: benjlevesque/short-sha@v4.0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Build single app for ${{ env.SCRIPT_NAME }}
        run: uv run pyinstaller ${{ env.SCRIPT_NAME }}.py --icon=trik-studio.ico --onefile
      - name: Archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.SCRIPT_NAME }}-${{ runner.os }}-${{ env.SHA }}
          path: |
            dist
            settings.ini
